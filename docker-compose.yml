services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas-dev
      POSTGRES_DB: atlas
    volumes:
      - atlas_data:/var/lib/postgresql/data
      - ./packages/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: atlas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "4000"
      DATABASE_URL: postgres://atlas:atlas-dev@postgres:5432/atlas?sslmode=disable
    ports:
      - "0.0.0.0:4000:4000"

  atlas-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://100.71.66.54:4000
    container_name: atlas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "0.0.0.0:3000:3000"

volumes:
  atlas_data:
