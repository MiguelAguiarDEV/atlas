name: cli-release

# Runs GoReleaser when a `cli-v*` tag is pushed (typically by release-please
# merging the release PR). Also supports manual dispatch against any ref.

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref or tag to build (e.g. cli-v1.0.0)'
        required: true
        default: 'cli-v1.0.0'

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: apps/cli
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
