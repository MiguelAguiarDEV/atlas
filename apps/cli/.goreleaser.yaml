version: 2

project_name: atlas-cli

# Monorepo layout: release-please produces tags like `cli-v1.0.0`. Strip the
# `cli-` prefix so goreleaser parses `v1.0.0` as semver.
monorepo:
  tag_prefix: cli-
  dir: apps/cli

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/atlas
    binary: atlas
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
